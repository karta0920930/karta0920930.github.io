<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球保險新聞監測中心</title>
    <style>
        /* 1. 基礎設定 - 與首頁完全對齊 */
        body {
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            line-height: 1.8;
            color: #334155;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 40px;
            background-color: #f8fafc;
        }

        /* 2. 統一導覽列 - 修正位置與大小一致性 */
        nav {
            display: flex;             
            justify-content: center;   
            align-items: center;       
            gap: 15px;                 
            padding: 20px 0;
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            border-radius: 0 0 15px 15px;
        }

        nav a, nav strong {
            text-decoration: none;
            font-size: 16px;
            color: #64748b;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 600;
            display: inline-block;
        }

        nav a:hover {
            color: #0ea5e9;
            background: #f0f9ff;
        }

        /* 標示「Insurance News」為當前頁面 */
        .current-page {
            color: #0ea5e9;
            background: #f0f9ff;
        }

        /* 3. 標題與區塊設計 */
        h1 {
            color: #0f172a;
            border-left: 8px solid #0ea5e9; /* 改為與首頁一致的藍色 */
            padding-left: 20px;
            margin: 40px 0 30px;
            font-size: 2em;
        }

        h2 {
            color: #1e293b;
            background: linear-gradient(90deg, #f0f9ff 0%, transparent 100%);
            padding: 12px 15px;
            border-left: 5px solid #0ea5e9;
            border-radius: 0 8px 8px 0;
            margin-top: 45px;
            font-size: 1.4em;
            display: flex;
            align-items: center;
        }

        section {
            background: white;
            padding: 30px;
            margin-bottom: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid #f1f5f9;
        }

        /* 4. 新聞列表樣式 */
        .news-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .news-item {
            display: flex;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
        }

        .news-item:hover {
            background-color: #f8fafc;
        }

        .news-item:last-child {
            border-bottom: none;
        }

        /* 5. 標籤與連結 */
        .category-tag {
            display: inline-block;
            background-color: #334155;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            margin-right: 15px;
            white-space: nowrap;
        }

        .news-link {
            text-decoration: none;
            color: #0369a1;
            font-weight: 600;
            flex: 1;
            font-size: 1.05em;
            line-height: 1.4;
        }

        .news-link:hover {
            color: #0ea5e9;
            text-decoration: underline;
        }

        .news-date {
            color: #94a3b8;
            font-size: 0.85em;
            margin-left: 20px;
            font-family: monospace;
        }

        /* 6. 狀態顯示 */
        .loading {
            text-align: center;
            color: #64748b;
            padding: 40px;
        }

        /* 響應式設計 */
        @media (max-width: 600px) {
            .news-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .news-date {
                margin-left: 0;
                margin-top: 8px;
            }
            .category-tag {
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">首頁 / 履歷</a>
        <strong class="current-page">Insurance News</strong>
        <a href="insuranceedu.html">保險知識</a>
        <a href="papers.html">論文更新</a>
    </nav>

    <header>
        <h1>每日保險新聞 (自動更新)</h1>
    </header>

    <section id="news-container">
        <div class="loading">📡 正在同步全球保險數據，請稍候...</div>
    </section>

    <footer style="text-align: center; color: #94a3b8; font-size: 0.85em; margin-top: 40px; padding: 20px; border-top: 1px solid #e2e8f0;">
        <p>&copy; 2026 保險監測系統 | 數據來源：Yahoo News & Google News</p>
        <p>最後更新時間：每日 08:00 (台北時間)</p>
    </footer>

    <script>
        async function fetchNews() {
            const container = document.getElementById('news-container');
            try {
                const response = await fetch('data/news_data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('無法讀取新聞資料');
                
                const data = await response.json();
                container.innerHTML = ''; 

                if (!data || data.length === 0) {
                    container.innerHTML = '<p class="loading">📭 今日暫無相關保險新聞。</p>';
                    return;
                }

                // 分類邏輯：根據 source 或是日文字元判斷
                const japanNews = data.filter(item => 
                    item.source === "日本業界動態" || /[ぁ-んァ-ン]/.test(item.title)
                );
                
                const taiwanNews = data.filter(item => 
                    item.source === "台灣新聞" || (!item.source && !/[ぁ-んァ-ン]/.test(item.title))
                );

                const renderGroup = (groupTitle, icon, newsItems) => {
                    if (newsItems.length === 0) return;

                    const groupWrapper = document.createElement('div');
                    groupWrapper.innerHTML = `<h2><span style="margin-right:10px">${icon}</span>${groupTitle}</h2>`;
                    
                    const list = document.createElement('ul');
                    list.className = 'news-list';

                    newsItems.forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'news-item';
                        const tagText = item.source || "最新動態";
                        
                        li.innerHTML = `
                            <span class="category-tag">${tagText}</span>
                            <a href="${item.link}" target="_blank" rel="noopener noreferrer" class="news-link">
                                ${item.title}
                            </a>
                            <span class="news-date">${item.date}</span>
                        `;
                        list.appendChild(li);
                    });

                    groupWrapper.appendChild(list);
                    container.appendChild(groupWrapper);
                };

                renderGroup("台灣保險要聞", "🇹🇼", taiwanNews);
                renderGroup("日本保險要聞", "🇯🇵", japanNews);

            } catch (error) {
                console.error('Fetch error:', error);
                container.innerHTML = `<div style="color:#c53030; background:#fff5f5; padding:20px; border-radius:12px; border:1px solid #feb2b2; text-align:center;">
                    <strong>⚠️ 系統連線異常</strong><br>資料尚未同步，請稍後再試。</div>`;
            }
        }
        window.onload = fetchNews;
    </script>
</body>
</html>
