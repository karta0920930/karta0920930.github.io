<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球保險新聞監測中心</title>
    <style>
        /* 1. 基礎設定 */
        body {
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            line-height: 1.8;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f4f7f9;
        }

        /* 2. 導覽列 */
        nav {
            text-align: right;
            margin-bottom: 30px;
        }
        nav a {
            color: #004080;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9em;
            transition: color 0.2s;
        }
        nav a:hover {
            color: #d9534f;
        }

        /* 3. 標題與區塊設計 */
        h1 {
            color: #002b5c;
            border-left: 8px solid #002b5c;
            padding-left: 15px;
            margin-bottom: 30px;
            font-size: 2em;
        }

        h2 {
            color: #004080;
            background: linear-gradient(90deg, #e9f0f7 0%, transparent 100%);
            padding: 10px 15px;
            border-left: 4px solid #004080;
            border-radius: 0 6px 6px 0;
            margin-top: 40px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
        }

        section {
            background: white;
            padding: 30px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        /* 4. 新聞列表樣式 */
        .news-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .news-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #edf2f7;
            transition: background 0.2s;
        }

        .news-item:hover {
            background-color: #fafafa;
        }

        .news-item:last-child {
            border-bottom: none;
        }

        /* 5. 標籤與連結 */
        .category-tag {
            display: inline-block;
            background-color: #002b5c;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75em;
            margin-right: 15px;
            white-space: nowrap;
        }

        .news-link {
            text-decoration: none;
            color: #1a56db;
            font-weight: 600;
            flex: 1;
            font-size: 1.05em;
            line-height: 1.4;
        }

        .news-link:hover {
            color: #d9534f;
            text-decoration: underline;
        }

        .news-date {
            color: #a0aec0;
            font-size: 0.85em;
            margin-left: 20px;
            font-family: monospace;
        }

        /* 6. 狀態顯示 */
        .loading {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        /* 響應式設計 */
        @media (max-width: 600px) {
            .news-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .news-date {
                margin-left: 0;
                margin-top: 8px;
            }
            .category-tag {
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>

    <nav>
    <a href="index.html">首頁 / 履歷</a>
    <a href="news.html">Insurance News</a>
    <a href="insuranceedu.html">保險知識</a>
    <a href="papers.html">論文更新</a>
    </nav>

    <header>
        <h1>每日保險新聞 (自動更新)</h1>
    </header>

    <section id="news-container">
        <div class="loading">📡 正在同步全球保險數據，請稍候...</div>
    </section>

    <footer style="text-align: center; color: #718096; font-size: 0.8em; margin-top: 40px;">
        <p>&copy; 2026 保險監測系統 | 數據來源：Nikkei News & Google News</p>
        <p>最後更新時間：每日 08:00 (台北時間)</p>
    </footer>

    <script>
        async function fetchNews() {
            const container = document.getElementById('news-container');
            try {
                // 使用時間戳避開瀏覽器快取
                const response = await fetch('data/news_data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('無法讀取新聞 JSON 資料，請確認路徑是否正確');
                
                const data = await response.json();
                container.innerHTML = ''; // 清除 Loading 狀態

                if (!data || data.length === 0) {
                    container.innerHTML = '<p class="loading">📭 今日暫無相關保險新聞。</p>';
                    return;
                }

                // --- 分類邏輯 ---
                // 判斷方式：source 標籤或標題中是否含有日文字元
                const japanNews = data.filter(item => 
                    item.source === "日本新聞" || /[ぁ-んァ-ン]/.test(item.title)
                );
                
                const taiwanNews = data.filter(item => 
                    item.source === "台灣新聞" || (!item.source && !/[ぁ-んァ-ン]/.test(item.title))
                );

                // --- 渲染函式 ---
                const renderGroup = (groupTitle, icon, newsItems) => {
                    if (newsItems.length === 0) return;

                    const groupWrapper = document.createElement('div');
                    groupWrapper.innerHTML = `<h2><span style="margin-right:10px">${icon}</span>${groupTitle}</h2>`;
                    
                    const list = document.createElement('ul');
                    list.className = 'news-list';

                    newsItems.forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'news-item';

                        const tagText = item.source || "最新動態";
                        
                        // 修正後的 HTML：移除冗餘的 onclick，確保連結行為正常
                        li.innerHTML = `
                            <span class="category-tag">${tagText}</span>
                            <a href="${item.link}" 
                               target="_blank" 
                               rel="noopener noreferrer" 
                               class="news-link">
                                ${item.title}
                            </a>
                            <span class="news-date">${item.date}</span>
                        `;
                        list.appendChild(li);
                    });

                    groupWrapper.appendChild(list);
                    container.appendChild(groupWrapper);
                };

                // 執行渲染
                renderGroup("台灣保險要聞", "🇹🇼", taiwanNews);
                renderGroup("日本保險要聞", "🇯🇵", japanNews);

            } catch (error) {
                console.error('Fetch error:', error);
                container.innerHTML = 
                    `<div style="color:#c53030; background:#fff5f5; padding:20px; border-radius:12px; border:1px solid #feb2b2; text-align:center;">
                        <strong>⚠️ 系統連線異常</strong><br>
                        請確認 <code>data/news_data.json</code> 是否已正確生成並上傳至 GitHub。<br>
                        <small style="color:#666">(錯誤訊息: ${error.message})</small>
                    </div>`;
            }
        }

        // 頁面載入後執行
        window.onload = fetchNews;
    </script>
</body>
</html>
